<script>

const USERS = [

{u:"3060167",p:"1",r:"ADMIN",n:"ADMIN"},
{u:"3092537",p:"1",r:"ADMIN",n:"Cụ"},

{u:"3164083",p:"1",r:"USER",n:"Hoàng Văn Phưởng"},
{u:"3141158",p:"1",r:"USER",n:"Nguyễn Thành Nam"},
{u:"3162642",p:"1",r:"USER",n:"Lê Quang Hưng"},
{u:"3060536",p:"1",r:"USER",n:"Nguyễn Đình Đạt"},
{u:"3029358",p:"1",r:"USER",n:"Hoàng Thái Bình"},
{u:"3072281",p:"1",r:"USER",n:"Hưng Khẹc"},
{u:"3084763",p:"1",r:"USER",n:"Ông Chú Việt"}

];

const MONEY = [

["500K",500000],
["200K",200000],
["100K",100000],
["50K",50000],
["20K",20000],
["10K",10000],
["5K",5000],
["2K",2000],
["1K",1000]

];

function getData(){

return JSON.parse(
localStorage.getItem("thinh_history") || "[]"
);

}

function saveData(data){

localStorage.setItem(
"thinh_history",
JSON.stringify(data)
);

}

let currentUser = null;

const savedUser =
localStorage.getItem("thinh_logged_user");

function startApp(){

document.getElementById("loginCard")
.classList.add("hidden");

document.getElementById("app")
.classList.remove("hidden");

document.getElementById("welcome")
.innerText =
"Xin chào, " + currentUser.n + "!";

document.getElementById("roleInfo")
.innerHTML =
"<strong>" + currentUser.u + "</strong>" +
"<span class='badge " +
(currentUser.r === "ADMIN"
? "admin"
: "user") +
"'>" + currentUser.r + "</span>";

renderMoney();

renderHistory();

}

if(savedUser){

currentUser = JSON.parse(savedUser);

window.onload = () => {

startApp();

};

}

function updateClock(){

const now = new Date();

const days = [
"Chủ nhật",
"Thứ hai",
"Thứ ba",
"Thứ tư",
"Thứ năm",
"Thứ sáu",
"Thứ bảy"
];

const text =
days[now.getDay()] + " - " +
now.toLocaleDateString("vi-VN") + " - " +
now.toLocaleTimeString("vi-VN");

document.getElementById("clock").innerText = text;

const c2 = document.getElementById("clock2");

if(c2){
c2.innerText = text;
}

}

setInterval(updateClock,1000);

updateClock();

function login(){

const u =
document.getElementById("username").value.trim();

const p =
document.getElementById("password").value.trim();

const found =
USERS.find(x => x.u === u && x.p === p);

if(!found){

alert("Sai tài khoản hoặc mật khẩu");

return;

}

currentUser = found;

localStorage.setItem(
"thinh_logged_user",
JSON.stringify(found)
);

startApp();

}

function renderMoney(){

const box =
document.getElementById("moneyGrid");

box.innerHTML = "";

MONEY.forEach(m => {

box.innerHTML += `
<div class="money-item">

<label>${m[0]}</label>

<input
type="number"
min="0"
data-money="${m[1]}"
oninput="calc()"
placeholder="Nhập số tờ">

</div>
`;

});

calc();

}

function calc(){

let total = 0;

document.querySelectorAll("[data-money]")
.forEach(el => {

const qty =
Number(el.value || 0);

const val =
Number(el.dataset.money);

total += qty * val;

});

document.getElementById("totalMoney")
.innerText =
total.toLocaleString("vi-VN") + " VNĐ";

}

function saveHistory(){

let total = 0;

let details = {};

document.querySelectorAll("[data-money]")
.forEach(el => {

const qty =
Number(el.value || 0);

const val =
Number(el.dataset.money);

details[val] = qty;

total += qty * val;

});

const histories = getData();

histories.unshift({

user:currentUser.u,
name:currentUser.n,
role:currentUser.r,
details:details,
total:total,
time:new Date().toLocaleString("vi-VN")

});

saveData(histories);

alert("Đã lưu bảng kê");

renderHistory();

}

function renderHistory(){

let histories = getData();

if(currentUser.r !== "ADMIN"){

histories =
histories.filter(
h => h.user === currentUser.u
);

}

const box =
document.getElementById("historyBox");

box.innerHTML = "";

if(histories.length === 0){

box.innerHTML =
"<div class='small'>Chưa có dữ liệu</div>";

return;

}

histories.forEach(h => {

box.innerHTML += `
<div class="history">

<div>
<strong>
${Number(h.total).toLocaleString("vi-VN")} VNĐ
</strong>
</div>

<div class="small">
Người dùng: ${h.name}
</div>

<div class="small">
${h.time}
</div>

</div>
`;

});

}

function logout(){

localStorage.removeItem(
"thinh_logged_user"
);

location.reload();

}

</script>
